services:
  mysql:
    build: ./mysql
    container_name: simple-app-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: simpledb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: simple-app-backend
    ports:
      - "8000:8000"
    environment:
      # For local dev, use full DATABASE_URL
      DATABASE_URL: mysql+pymysql://appuser:apppassword@mysql:3306/simpledb
      # Or use individual components (like ECS will)
      # DB_USERNAME: appuser
      # DB_PASSWORD: apppassword
      # DB_HOST: mysql
      # DB_PORT: 3306
      # DB_NAME: simpledb
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: simple-app-frontend
    ports:
      - "8080:8080"
    environment:
      VITE_API_URL: http://localhost:8000
      ALLOW_DELETE: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:

